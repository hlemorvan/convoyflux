name: Backend CI

on:
  push:
    paths: ['backend/**', 'simulator/**', '.github/workflows/backend.yml']
  pull_request:
    paths: ['backend/**', 'simulator/**']

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build & unit tests (domain, application, infrastructure, presentation)
        working-directory: backend
        run: mvn test -B -pl domain,application,infrastructure,presentation

      - name: Integration tests + BDD Cucumber (bootstrap)
        working-directory: backend
        run: mvn verify -B -pl bootstrap -am
        env:
          # Testcontainers gère Docker — pas de service externe nécessaire
          TESTCONTAINERS_RYUK_DISABLED: false

      - name: Simulator unit tests
        working-directory: simulator
        run: mvn test -B

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/**/target/site/jacoco/

      - name: Upload Cucumber report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: backend/bootstrap/target/cucumber-report.json
